name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  NPM_CONFIG_LEGACY_PEER_DEPS: "true"

jobs:
  format:
    name: Format Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Show environment details
        shell: bash
        run: |
          set -euxo pipefail
          echo "Node version:"
          node --version
          echo "NPM version:"
          npm --version
          echo "Available npm scripts:"
          node -e "const pkg=require('./package.json'); console.log(pkg.scripts)"

      - name: Print package and Prettier config
        shell: bash
        run: |
          set -euxo pipefail
          echo "package.json"
          cat package.json
          echo ".prettierrc"
          cat .prettierrc

      - name: Install dependencies
        shell: bash
        run: |
          set -euxo pipefail
          npm config set fund false
          npm config set audit false
          for i in 1 2 3; do
            npm ci --legacy-peer-deps --omit=optional && break
            echo "npm ci failed (attempt $i). Retrying in 10s..."
            sleep 10
          done

      - name: Verify formatting
        shell: bash
        run: |
          set -euxo pipefail
          echo "Running explicit format check..."
          npm run format

      - name: Debug format failure
        if: failure()
        shell: bash
        run: |
          echo "Format job failed. Displaying repository and package details for debugging."
          pwd
          ls -la
          echo "Package scripts:"
          cat package.json
          echo "Prettier config:"
          cat .prettierrc
          echo "Files failing Prettier check:"
          npx prettier --check "**/*.{cls,cmp,component,css,html,js,json,md,page,trigger,xml,yaml,yml}" || true
          echo "NPM log files:"
          find "$HOME/.npm/_logs" -type f -maxdepth 1 2>/dev/null | sort || true
          for logfile in "$HOME"/.npm/_logs/*; do
            [ -f "$logfile" ] || continue
            echo "===== $logfile ====="
            cat "$logfile"
          done

  test:
    name: Test Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Show environment details
        shell: bash
        run: |
          set -euxo pipefail
          echo "Node version:"
          node --version
          echo "NPM version:"
          npm --version
          echo "Available npm scripts:"
          node -e "const pkg=require('./package.json'); console.log(pkg.scripts)"

      - name: Install dependencies
        shell: bash
        run: |
          set -euxo pipefail
          npm config set fund false
          npm config set audit false
          for i in 1 2 3; do
            npm ci --legacy-peer-deps --omit=optional && break
            echo "npm ci failed (attempt $i). Retrying in 10s..."
            sleep 10
          done

      - name: Detect Jest test files
        id: detect_tests
        shell: bash
        run: |
          set -euxo pipefail
          if find force-app -type f \( -name "*.test.js" -o -name "*.spec.js" \) | grep -q .; then
            echo "has_tests=true" >> "$GITHUB_OUTPUT"
            echo "Detected test files:"
            find force-app -type f \( -name "*.test.js" -o -name "*.spec.js" \) | sort
          else
            echo "has_tests=false" >> "$GITHUB_OUTPUT"
            echo "No Jest/LWC test files were found under force-app."
          fi

      - name: Run Jest tests
        if: steps.detect_tests.outputs.has_tests == 'true'
        shell: bash
        run: |
          set -euxo pipefail
          echo "Running Jest tests with CI reporters..."
          if npm ls jest-junit >/dev/null 2>&1; then
            echo "jest-junit detected. Running with JUnit reporter."
            npm run test -- --ci --runInBand --reporters=default --reporters=jest-junit
          else
            echo "jest-junit not installed. Running with default reporter only."
            npm run test -- --ci --runInBand --reporters=default
          fi

      - name: Skip test execution
        if: steps.detect_tests.outputs.has_tests != 'true'
        shell: bash
        run: |
          echo "Test step skipped because the repository currently has no Jest test files."

      - name: Debug test failure
        if: failure()
        shell: bash
        run: |
          echo "Test job failed. Displaying repository state for debugging."
          pwd
          ls -la
          echo "Detected test files:"
          find force-app -type f \( -name "*.test.js" -o -name "*.spec.js" \) | sort || true
          echo "NPM log files:"
          find "$HOME/.npm/_logs" -type f -maxdepth 1 2>/dev/null | sort || true
          for logfile in "$HOME"/.npm/_logs/*; do
            [ -f "$logfile" ] || continue
            echo "===== $logfile ====="
            cat "$logfile"
          done

  validate:
    name: Metadata Validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate core project files
        shell: bash
        run: |
          set -euxo pipefail
          required_files=(
            "sfdx-project.json"
            "manifest/package.xml"
            "force-app/main/default/objects/Lead/fields/Lead_Score.field-meta.xml"
            "force-app/main/default/objects/Lead/fields/Lead_Rating.field-meta.xml"
            "force-app/main/default/objects/Asset/fields/Opportunity_Value.field-meta.xml"
            "force-app/main/default/objects/Case/fields/Severity_Number.field-meta.xml"
            "force-app/main/default/permissionsets/Sales_Representative.permissionset-meta.xml"
            "force-app/main/default/permissionsets/Service_Agent.permissionset-meta.xml"
            "force-app/main/default/reports/ComplianceReports/Case_Severity_By_Month_Last_Year_ReM.report-meta.xml"
          )

          for file in "${required_files[@]}"; do
            echo "Checking file: $file"
            test -f "$file"
          done

      - name: Validate metadata contents
        shell: bash
        run: |
          set -euxo pipefail
          echo "Validating Lead Score metadata..."
          grep -n "Lead_Score__c" force-app/main/default/objects/Lead/fields/Lead_Score.field-meta.xml
          echo "Validating Lead Rating metadata..."
          grep -n "Lead_Rating__c" force-app/main/default/objects/Lead/fields/Lead_Rating.field-meta.xml
          echo "Validating Opportunity Value metadata..."
          grep -n "Opportunity_Value__c" force-app/main/default/objects/Asset/fields/Opportunity_Value.field-meta.xml
          echo "Validating Severity Number metadata..."
          grep -n "Severity_Number__c" force-app/main/default/objects/Case/fields/Severity_Number.field-meta.xml
          echo "Validating report metadata..."
          grep -n "Close Month" force-app/main/default/reports/ComplianceReports/Case_Severity_By_Month_Last_Year_ReM.report-meta.xml
          grep -n "Case Severity By Month Last Year" force-app/main/default/reports/ComplianceReports/Case_Severity_By_Month_Last_Year_ReM.report-meta.xml

      - name: Debug metadata failure
        if: failure()
        shell: bash
        run: |
          echo "Metadata validation failed. Displaying key directories for debugging."
          pwd
          ls -la
          find force-app -maxdepth 6 -type f | sort
